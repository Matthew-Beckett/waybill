kind: WaybillConfig
version: v1alpha1
metadata:
  name: matchers-reference
  description: >
    Reference guide for all four matcher types.

    A matcher answers the question "which streams from Dispatcharr should
    contribute to this channel?"  Choose the type that fits how your IPTV
    provider names its streams:

      regex       — use when stream names follow a predictable pattern, such
                    as numbered channels or consistent quality suffixes.
                    Most powerful, requires some regex knowledge.

      hasPrefix   — use when all the streams you want share a common prefix
                    such as "UK| NBS" or "UK| Arena Sports".  Plain text,
                    no regex required.

      containsAny — use when you want to catch streams from several providers
                    that all share a keyword ("Sports", "News") regardless of
                    their prefix.  Also plain text.

      exactMatch  — use when you have looked up the exact stream names in
                    Dispatcharr and want to pin them precisely.  Most explicit.

    Multiple matchers on one member are evaluated in sequence — each one
    filters the set from the previous step.  Combine keep and drop to first
    cast a wide net, then trim out streams you don't want.

spec:
  profiles:
    main:
      name: Main

      groups:

        # ── regex ─────────────────────────────────────────────────────────
        regex_examples:
          name: Regex Matcher Examples
          members:

            - name: VTN 1–4 HD (regex keep — numbered family)
              # Your provider delivers "UK| VTN1 HD", "UK| VTN2 HD", etc.
              # The pattern anchors to the start (^) and end ($) so you don't
              # accidentally catch "UK| VTN1 +1 HD" (the +1 time-shift channel).
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| VTN[1-4] HD$"

            - name: NBS channels — excluding NBS Three (regex keep + regex drop)
              # Keep all NBS HD streams with the first matcher, then drop the
              # ones you don't want with the second.  Two focused patterns are
              # easier to maintain than one complex expression that does both.
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| NBS .*(HD|FHD)$"
                - type: regex
                  field: name
                  action: drop
                  # NBS Three moved to streaming-only; skip it.
                  pattern: "^UK\\| NBS Three"

            - name: NBS channels by tvg_id (regex on a non-name field)
              # If stream names are unreliable but tvg_ids are consistent,
              # match on tvg_id instead.  Any stream field works.
              matchers:
                - type: regex
                  field: tvg_id
                  action: keep
                  caseSensitive: false
                  pattern: "^nbs\\.(one|two|four|news)\\.demo$"

        # ── hasPrefix ─────────────────────────────────────────────────────
        has_prefix_examples:
          name: HasPrefix Matcher Examples
          members:

            - name: All Arena Sports channels (hasPrefix keep — single prefix)
              # Keeps any stream whose name starts with "UK| Arena Sports".
              # Catches "UK| Arena Sports 1 HD", "UK| Arena Sports Main Event HD",
              # "UK| Arena Sports News HD", etc. in a single matcher.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Arena Sports"

            - name: NBS from multiple providers (hasPrefix — multiple prefixes)
              # Your main provider uses "UK| NBS"; a backup uses "GBR| NBS".
              # List both prefixes — a stream matching either one is kept.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| NBS"
                    - "GBR| NBS"

            - name: Arena Sports excluding +1 time-shifts (hasPrefix keep + hasPrefix drop)
              # First matcher: keep everything starting with "UK| Arena Sports".
              # Second matcher: drop the +1 time-shifted channels you don't need.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Arena Sports"
                - type: hasPrefix
                  field: name
                  action: drop
                  prefixes:
                    - "UK| Arena Sports+ "   # +1 channels all start with this

            - name: NBS One — case-insensitive prefix (hasPrefix caseSensitive false)
              # caseSensitive: false is the default; shown explicitly here for
              # clarity.  "uk| nbs one HD" and "UK| NBS One HD" both match.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  caseSensitive: false
                  prefixes:
                    - "uk| nbs one"

        # ── containsAny ───────────────────────────────────────────────────
        contains_any_examples:
          name: ContainsAny Matcher Examples
          members:

            - name: All sport channels from any provider (containsAny keep)
              # Useful when different providers each use their own prefix, but
              # the channel name always contains a recognisable keyword.
              # "UK| Arena Sports 1 HD", "UK| Titan Sport 2 HD", etc. all match.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "Arena Sports"
                    - "Titan Sport"
                    - "Titan Extra"
                    - "Velocity Sport"

            - name: News channels — excluding entertainment (containsAny keep + drop)
              # Cast a wide net for news channels, then drop channels that
              # contain "News" in their name but are entertainment-adjacent
              # (chat shows, magazine programmes, etc.).
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "NBS News"
                    - "Orbit News"
                    - "VTN News"
                    - "Apex News"
                - type: containsAny
                  field: name
                  action: drop
                  substrings:
                    - "Extra"
                    - "+1"

            - name: Apex TV family (containsAny caseSensitive true)
              # caseSensitive: true means substring matching is exact-case.
              # Use this when the keyword is reliably capitalised in your feed.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  caseSensitive: true
                  substrings:
                    - "Apex TV"
                    - "Apex 2"
                    - "Apex 3"
                    - "Apex Films"

        # ── exactMatch ────────────────────────────────────────────────────
        exact_match_examples:
          name: ExactMatch Matcher Examples
          members:

            - name: NBS One — all known stream names (exactMatch keep)
              # If you have checked your Dispatcharr stream library and know the
              # exact names your provider uses, list them here.  Nothing outside
              # this list will ever be matched, which prevents accidental
              # captures if a provider adds new streams with similar names.
              matchers:
                - type: exactMatch
                  field: name
                  action: keep
                  values:
                    - "UK| NBS One HD"
                    - "UK| NBS One FHD"
                    - "UK| NBS 1 HD"
                    - "UK| NBS1 HD"

            - name: Orbit News — HD only (exactMatch keep + exactMatch drop)
              # Keep the HD and FHD copies, then explicitly drop the SD one
              # in case a provider adds it to the feed later.
              matchers:
                - type: exactMatch
                  field: name
                  action: keep
                  values:
                    - "UK| Orbit News HD"
                    - "UK| Orbit News FHD"
                    - "UK| Orbit News"
                - type: exactMatch
                  field: name
                  action: drop
                  values:
                    - "UK| Orbit News SD"   # drop the SD copy explicitly

            - name: Apex TV family — pinned by tvg_id (exactMatch on tvg_id)
              # Matching on tvg_id is a good fallback when a provider keeps
              # renaming the stream but the EPG ID stays stable.
              matchers:
                - type: exactMatch
                  field: tvg_id
                  action: keep
                  values:
                    - "apex.demo"
                    - "apex2.demo"
                    - "morapex2.demo"
                    - "apexfilms.demo"
