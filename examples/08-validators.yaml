kind: WaybillConfig
version: v1alpha1
metadata:
  name: validators-example
  description: >
    Demonstrates all three validator types and how to use them as automated
    feed-health checks.

    IPTV providers change stream names without warning.  A channel gets
    renamed, drops off the feed, or gains a new quality suffix overnight.
    You won't notice until someone in your household complains they can't
    watch something.

    Validators let Waybill catch these problems automatically:

      count      -- "NBS One must always have at least one stream.  If it
                    disappears, fail the plan before anything is applied."

      regexMatch -- "After transformation the channel name must look like
                    'Arena Sports N'.  If it doesn't, something went wrong."

      nonEmpty   -- "Every channel must have a tvg_id.  Without it the EPG
                    guide won't work."

    action: warn  -- logs the violation but continues.  Use for soft checks.
    action: fail  -- logs and aborts execution before any DB write.  Use for
                    critical checks where a wrong result is worse than no
                    result.

spec:
  profiles:
    main:
      name: Main

      groups:

        # -----------------------------------------------------------------
        # count validator
        # Checks the number of channels a member produces (scope: member)
        # or the number of streams in a channel (scope: channel).
        # -----------------------------------------------------------------
        count_validators:
          name: Count Validators
          members:

            - name: NBS One (count -- fail if missing)
              # The most important check: if NBS One has zero streams in the
              # feed you want to know immediately.  action: fail aborts the
              # plan before any channel is written to Dispatcharr.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| NBS One"
              transformers:
                - type: setMetadata
                  name: "NBS One"
                  tvgId: "nbs.one.demo"
              validators:
                - type: count
                  scope: member
                  operator: gt
                  value: 0
                  action: fail

            - name: NBS News (count -- warn if missing)
              # action: warn logs the problem but the plan continues.
              # Use this for channels that are nice-to-have but not critical.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "NBS News"
              transformers:
                - type: set
                  field: name
                  value: "NBS News"
              validators:
                - type: count
                  scope: member
                  operator: gt
                  value: 0
                  action: warn

            - name: Arena Sports 1 (count -- warn if too many streams)
              # An upper-bound check: if Arena Sports 1 suddenly has more than
              # 5 streams your matcher may be too broad and picking up related
              # channels (Arena Sports 1 Extra, Arena Sports 1 HD2, etc.).
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| Arena Sports 1 (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "Arena Sports 1"
              validators:
                - type: count
                  scope: channel
                  operator: lte
                  value: 5
                  action: warn

        # -----------------------------------------------------------------
        # regexMatch validator
        # Checks that a field value matches a pattern after transformation.
        # -----------------------------------------------------------------
        regex_match_validators:
          name: RegexMatch Validators
          members:

            - name: VTN 1-4 (regexMatch -- verify name after transformation)
              # After stripping the prefix and suffix, every stream name
              # should look like "VTN 1", "VTN 2", etc.  If a provider adds
              # an unexpected character the transformer output will fail this
              # check and you'll know immediately.
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: ".*VTN.*(ONE|TWO|THREE|FOUR|1|2|3|4).*"
              transformers:
                - type: convertCardinalNumbers
                  field: name
                  outputType: number
                - type: regex
                  field: name
                  action: replace
                  pattern: "^UK\\| "
                  replacement: ""
                - type: regex
                  field: name
                  action: replace
                  pattern: "\\s+(HD|FHD)$"
                  replacement: ""
              validators:
                # scope: stream checks every individual transformed stream.
                - type: regexMatch
                  scope: stream
                  field: name
                  pattern: "^VTN [1-4]$"
                  action: warn

            - name: Apex TV family (regexMatch -- verify channel name)
              # scope: channel checks the final assembled channel after
              # merging; useful when you care about the emitted metadata
              # rather than each individual contributing stream.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Apex TV"
                    - "UK| Apex 2"
              transformers:
                - type: strip
                  field: name
                  prefix: "UK| "
                  suffix: " HD"
              validators:
                - type: regexMatch
                  scope: channel
                  field: name
                  pattern: "^(Apex TV|Apex 2)$"
                  action: fail

        # -----------------------------------------------------------------
        # nonEmpty validator
        # Checks that a field is not blank after transformation.
        # -----------------------------------------------------------------
        non_empty_validators:
          name: NonEmpty Validators
          members:

            - name: Arena Sports (nonEmpty tvg_id -- EPG check)
              # If the transformed stream has no tvg_id the programme guide
              # will show no listings for that channel.  action: warn flags
              # the problem so you can add the tvg_id via setMetadata.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Arena Sports"
              transformers:
                - type: strip
                  field: name
                  prefix: "UK| "
                  suffix: " HD"
              validators:
                - type: nonEmpty
                  scope: stream
                  field: tvg_id
                  action: warn

            - name: NBS News (nonEmpty logo + tvg_id -- full metadata check)
              # Require both logo_url and tvg_id on the assembled channel.
              # Missing either means the channel is incomplete in Dispatcharr.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "NBS News"
              transformers:
                - type: setMetadata
                  name: "NBS News"
                  tvgId: "nbs.news.demo"
              validators:
                - type: nonEmpty
                  scope: channel
                  field: tvg_id
                  action: fail
                - type: nonEmpty
                  scope: channel
                  field: logo_url
                  action: warn

        # -----------------------------------------------------------------
        # Combined validators
        # Multiple validators on one member act as a full sanity-check suite.
        # -----------------------------------------------------------------
        combined_validators:
          name: Combined Validators -- Full Channel Sanity Check
          members:

            - name: NBS One (count + regexMatch + nonEmpty)
              # Three checks together:
              #   1. At least one stream must be matched (count).
              #   2. The final channel name must be exactly "NBS One" (regexMatch).
              #   3. Every stream must carry a tvg_id for the EPG guide (nonEmpty).
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| NBS One"
              transformers:
                - type: setMetadata
                  name: "NBS One"
                  tvgId: "nbs.one.demo"
              validators:
                - type: count
                  scope: member
                  operator: gt
                  value: 0
                  action: fail
                - type: regexMatch
                  scope: channel
                  field: name
                  pattern: "^NBS One$"
                  action: fail
                - type: nonEmpty
                  scope: stream
                  field: tvg_id
                  action: warn
