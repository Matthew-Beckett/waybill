kind: WaybillConfig
version: v1alpha1
metadata:
  name: transformers-reference
  description: >
    Reference guide for all six transformer types used to clean up stream
    names and set channel metadata.

    IPTV providers rarely give streams the tidy names you want to display.
    They add provider prefixes ("UK| "), quality suffixes (" HD", " FHD"),
    inconsistent capitalisation ("NBS ONE" vs "NBS One"), or extra whitespace.
    Transformers run after a stream has been matched and rewrite its fields
    before Dispatcharr stores the channel.

    Transformers run in declaration order, so you can chain them: strip the
    provider prefix, then strip the quality suffix, then set the logo.

spec:
  profiles:
    main:
      name: Main

      groups:

        # ── strip ─────────────────────────────────────────────────────────
        strip_examples:
          name: Strip — Remove Fixed Prefixes and Suffixes
          members:

            - name: NBS One — strip provider prefix (strip prefix)
              # "UK| NBS One HD"  →  "NBS One HD"
              # strip removes a literal string from the start or end of the
              # field.  If the prefix is absent on a stream, strip does nothing
              # rather than failing, so it is safe to apply broadly.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| NBS One"
              transformers:
                - type: strip
                  field: name
                  prefix: "UK| "

            - name: Arena Sports — strip prefix and suffix together (strip prefix + suffix)
              # "UK| Arena Sports 1 HD"  →  "Arena Sports 1"
              # Supply both prefix and suffix in the same transformer.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Arena Sports"
              transformers:
                - type: strip
                  field: name
                  prefix: "UK| "
                  suffix: " HD"

        # ── regex ─────────────────────────────────────────────────────────
        regex_examples:
          name: Regex — Pattern-based Rewriting
          members:

            - name: VTN — strip any provider prefix (regex replace)
              # "UK| VTN1 HD"  →  "VTN1 HD"
              # The pattern matches any "XX| " prefix so this member keeps
              # working if you switch to a provider that uses "GBR| " or "EN| ".
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| VTN[1-4] HD$"
              transformers:
                - type: regex
                  field: name
                  action: replace
                  pattern: "^[A-Z]+\\| "    # strips any "XX| " country prefix
                  replacement: ""

            - name: Arena Sports — chained regex (multi-step pipeline)
              # Step 1: "UK| Arena Sports 1 HD"  →  "Arena Sports 1 HD"
              # Step 2: "Arena Sports 1 HD"       →  "Arena Sports 1"
              # Two focused patterns are easier to read and maintain than one
              # large expression that tries to do everything at once.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Arena Sports"
              transformers:
                - type: regex
                  field: name
                  action: replace
                  pattern: "^UK\\| "
                  replacement: ""
                - type: regex
                  field: name
                  action: replace
                  pattern: "\\s+(HD|FHD|UHD|SD)$"    # strips any quality suffix
                  replacement: ""

            - name: Rewrite tvg_id (regex on a non-name field)
              # Transformers can target any stream field, not just name.
              # Here the raw tvg_id from the provider is rewritten to match
              # what your EPG source expects.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Apex TV"
              transformers:
                - type: regex
                  field: tvg_id
                  action: replace
                  pattern: "^apex-(.+)\\.raw$"
                  replacement: "$1.apex.demo"

        # ── set ───────────────────────────────────────────────────────────
        set_examples:
          name: Set — Hard-code a Specific Value
          members:

            - name: Vista One — force canonical name (set)
              # set overwrites the field with a literal value regardless of
              # what the stream had before.  Use it when your matcher is
              # already precise enough and you just want a clean fixed name.
              matchers:
                - type: exactMatch
                  field: name
                  action: keep
                  caseSensitive: false
                  values:
                    - "uk| vista one hd"
                    - "uk| vista one hd"
                    - "uk| vista one hd"
              transformers:
                - type: set
                  field: name
                  value: "Vista One"

            - name: Crestwood — set name and tvg_id (multiple set transformers)
              # You can chain set transformers to update multiple fields.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  caseSensitive: false
                  substrings:
                    - "crestwood"
              transformers:
                - type: set
                  field: name
                  value: "Crestwood"
                - type: set
                  field: tvg_id
                  value: "crestwood.demo"

        # ── setMetadata ───────────────────────────────────────────────────
        set_metadata_examples:
          name: SetMetadata — Name, Logo, and TVG-ID in One Step
          members:

            - name: NBS News — full metadata (setMetadata all fields)
              # setMetadata sets name, logoUrl, and tvg_id in a single declaration.
              # It is cleaner than three separate "set" transformers when you
              # know the exact values for all three fields up front.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "NBS News"
              transformers:
                - type: setMetadata
                  name: "NBS News"
                  logoUrl: "https://images.dispatcharr.example/logos/nbs-news.png"
                  tvgId: "nbs.news.demo"

            - name: Orbit News — logo and tvg_id only (setMetadata partial)
              # You do not have to set all three fields.  Omit any you want
              # Dispatcharr to manage on its own.  Here the name is already
              # clean after strip, so only logo and tvg_id are set.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "Orbit News"
              transformers:
                - type: strip
                  field: name
                  prefix: "UK| "
                  suffix: " HD"
                - type: setMetadata
                  logoUrl: "https://images.dispatcharr.example/logos/orbit-news.png"
                  tvgId: "orbit.news.demo"

        # ── convertCardinalNumbers ────────────────────────────────────────
        cardinal_examples:
          name: ConvertCardinalNumbers — Words ↔ Digits
          members:

            - name: VTN — words to digits (outputType number)
              # Some providers name the channel "UK| VTN ONE HD" (word form);
              # others use "UK| VTN1 HD" (digit, no space).
              # convertCardinalNumbers normalises every stream to the same form
              # before the name is stored, so downstream tools see consistent
              # channel names.
              # "VTN ONE"  →  "VTN 1"
              # "VTN TWO"  →  "VTN 2"
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: ".*VTN.*(ONE|TWO|THREE|FOUR|1|2|3|4).*"
              transformers:
                - type: regex
                  field: name
                  action: replace
                  pattern: "^UK\\| "
                  replacement: ""
                - type: convertCardinalNumbers
                  field: name
                  outputType: number
                - type: regex
                  field: name
                  action: replace
                  pattern: "\\s+(HD|FHD)$"
                  replacement: ""

            - name: NBS — digits to words (outputType word)
              # "NBS 1"  →  "NBS ONE"
              # Less common, but useful if your EPG source or Kodi skin expects
              # the word form of numbered channels.
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| NBS [1-4]"
              transformers:
                - type: strip
                  field: name
                  prefix: "UK| "
                  suffix: " HD"
                - type: convertCardinalNumbers
                  field: name
                  outputType: word
