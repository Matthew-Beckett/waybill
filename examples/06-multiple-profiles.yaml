kind: WaybillConfig
version: v1alpha1
metadata:
  name: multiple-profiles-example
  description: >
    Multiple independent profiles in a single manifest.

    Each profile becomes a separate channel list in Dispatcharr.  The most
    common homelab reason to use multiple profiles is a quality split:

      hd   -- HD and FHD streams for your main TV or media centre, served
              via Proxy for buffering.

      sd   -- SD streams (plus HD fallback) for phones and tablets where
              bandwidth is limited, served via Redirect to reduce overhead.

      kids -- A dedicated children's channel list with its own set of
              channels, independent from the main adult list.

    Profiles are completely independent: groups, members, stream profiles,
    and variables in one profile do not affect any other profile.

spec:
  profiles:

    # -- HD profile -----------------------------------------------------------
    # Best-quality streams for your main TV or media centre.
    hd:
      name: HD -- Main TV
      streamProfile: Proxy

      groups:

        news:
          name: News
          members:

            - name: NBS News
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| NBS News (HD|FHD)$"
              transformers:
                - type: setMetadata
                  name: "NBS News"
                  tvgId: "nbs.news.demo"

            - name: Orbit News
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| Orbit News (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "Orbit News"

        entertainment:
          name: Entertainment
          members:

            - name: NBS One
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| NBS One (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "NBS One"

            - name: NBS Two
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| NBS Two (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "NBS Two"

            - name: VTN
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| VTN1? (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "VTN"

            - name: Apex TV
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| Apex TV (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "Apex TV"

        sports:
          name: Sports
          # Sports streams are high-bitrate live content; Redirect avoids the
          # extra buffering hop that can cause frame drops.
          streamProfile: Redirect
          members:

            - name: Arena Sports 1
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| Arena Sports 1 (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "Arena Sports 1"

            - name: Arena Sports 2
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| Arena Sports 2 (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "Arena Sports 2"

            - name: Titan Sport 1
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| Titan Sport 1 (HD|FHD)$"
              transformers:
                - type: set
                  field: name
                  value: "Titan Sport 1"

    # -- SD / mobile profile --------------------------------------------------
    # Lower-bitrate streams for phones and tablets.
    sd:
      name: SD -- Mobile
      # Redirect is low-overhead and well-suited for mobile clients.
      streamProfile: Redirect

      groups:

        news:
          name: News
          members:

            - name: NBS News
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| NBS News"
                # Drop FHD/UHD copies -- too heavy for mobile.
                - type: regex
                  field: name
                  action: drop
                  pattern: "\\b(FHD|UHD)\\b"
              transformers:
                - type: set
                  field: name
                  value: "NBS News"

            - name: Orbit News
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Orbit News"
                - type: regex
                  field: name
                  action: drop
                  pattern: "\\b(FHD|UHD)\\b"
              transformers:
                - type: set
                  field: name
                  value: "Orbit News"

        entertainment:
          name: Entertainment
          members:

            - name: NBS One
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| NBS One"
                - type: regex
                  field: name
                  action: drop
                  pattern: "\\b(FHD|UHD)\\b"
              transformers:
                - type: set
                  field: name
                  value: "NBS One"

            - name: VTN
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| VTN1? (HD|SD)$"
              transformers:
                - type: set
                  field: name
                  value: "VTN"

            - name: Apex TV
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Apex TV"
                - type: regex
                  field: name
                  action: drop
                  pattern: "\\b(FHD|UHD)\\b"
              transformers:
                - type: set
                  field: name
                  value: "Apex TV"

    # -- Kids profile ---------------------------------------------------------
    # A separate profile dedicated to children's content.
    kids:
      name: Kids
      streamProfile: Proxy

      groups:

        nbs_kids:
          name: NBS Children's
          members:

            - name: Sprout
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  caseSensitive: false
                  substrings:
                    - "sprout"
              transformers:
                - type: set
                  field: name
                  value: "Sprout"

            - name: Juniper
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  caseSensitive: false
                  substrings:
                    - "juniper"
                - type: containsAny
                  field: name
                  action: drop
                  caseSensitive: false
                  substrings:
                    - "sprout"
              transformers:
                - type: set
                  field: name
                  value: "Juniper"

        indie_kids:
          name: Other Children's
          streamProfile: Redirect
          members:

            - name: Pixel Network
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  caseSensitive: false
                  substrings:
                    - "pixel network"
              transformers:
                - type: set
                  field: name
                  value: "Pixel Network"

            - name: Relay
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  caseSensitive: false
                  substrings:
                    - "relay"
                - type: containsAny
                  field: name
                  action: drop
                  substrings:
                    - "Relay Jr"
                    - "RelayToons"
              transformers:
                - type: set
                  field: name
                  value: "Relay"
