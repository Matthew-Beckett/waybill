kind: WaybillConfig
version: v1alpha1
metadata:
  name: stream-profiles-example
  description: >
    Demonstrates stream profile inheritance: profile → group → member.

    Dispatcharr supports different stream profiles that control how streams
    are delivered to your devices.  A typical homelab setup has:

      Proxy    — Dispatcharr fetches and re-serves the stream through its own
                 buffer.  Adds resilience and caching; best for reliable,
                 always-on channels such as news and general entertainment.

      Redirect — Dispatcharr redirects your client straight to the provider
                 URL.  Zero buffering overhead; best for high-bitrate live
                 sport where an extra hop causes dropped frames.

    The resolved profile comes from the most specific scope that sets it:

      member → group → profile → (none)

    Setting streamProfile: null at any level explicitly clears the inherited
    value so Dispatcharr falls back to its own built-in default.

spec:
  profiles:
    main:
      name: Main
      # Profile-wide default: all channels use Proxy unless a group or
      # member overrides it.
      streamProfile: Proxy

      groups:

        entertainment:
          name: Entertainment
          # No streamProfile here — inherits Proxy from the profile.
          members:

            - name: NBS One
              # Inherits Proxy from the profile.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| NBS One"
              transformers:
                - type: strip
                  field: name
                  prefix: "UK| "
                  suffix: " HD"

            - name: VTN
              # Inherits Proxy from the profile.
              matchers:
                - type: regex
                  field: name
                  action: keep
                  pattern: "^UK\\| VTN1? HD$"
              transformers:
                - type: set
                  field: name
                  value: "VTN"

        sports:
          name: Sports
          # Group-level override: sports are high-bitrate live events.
          # Redirect connects the client directly to the provider so there
          # is no extra buffering hop that can cause frame drops.
          streamProfile: Redirect

          members:

            - name: Arena Sports 1
              # Inherits Redirect from the group.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Arena Sports 1"
              transformers:
                - type: set
                  field: name
                  value: "Arena Sports 1"

            - name: Arena Sports 2
              # Inherits Redirect from the group.
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Arena Sports 2"
              transformers:
                - type: set
                  field: name
                  value: "Arena Sports 2"

            - name: Titan Sport 1
              # Member-level override: this provider's Titan Sport stream is
              # more stable when served through Proxy.  Member wins over group.
              streamProfile: Proxy
              matchers:
                - type: hasPrefix
                  field: name
                  action: keep
                  prefixes:
                    - "UK| Titan Sport 1"
              transformers:
                - type: set
                  field: name
                  value: "Titan Sport 1"

        news:
          name: News
          # null clears the inherited Proxy value.  Dispatcharr will use its
          # own built-in default for these channels rather than Proxy.
          streamProfile: null

          members:

            - name: NBS News
              # Inherits null (no profile) from the group.
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "NBS News"
              transformers:
                - type: set
                  field: name
                  value: "NBS News"

            - name: Orbit News
              # Member-level override: even though the group is null, this
              # channel specifically needs Redirect for lower latency.
              streamProfile: Redirect
              matchers:
                - type: containsAny
                  field: name
                  action: keep
                  substrings:
                    - "Orbit News"
              transformers:
                - type: set
                  field: name
                  value: "Orbit News"
